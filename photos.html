<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photos 💖</title>
<style>
body{
  margin:0;
  padding:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#ffc0cb; /* light pink background */
  font-family:Arial, sans-serif;
}
.card{
  background-color:#ffe4e1; /* slightly lighter pink */
  width:360px;
  max-width:95%;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px #ff69b4;
  text-align:center;
}
h1{
  font-size:22px;
  color:#ff1493;
  margin-bottom:15px;
}
.photos-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.photos-container img{
  width:120px; /* choti photo */
  border-radius:10px;
}
</style>
</head>
<body>

<div class="card">
<h1>Memorable Photos 💖</h1>

<div class="photos-container">
  <img src="photo1.jpg" alt="Photo1">
  <img src="photo2.jpg" alt="Photo2">
  <img src="photo3.jpg" alt="Photo3">
  <img src="photo4.jpg" alt="Photo4">
  <img src="photo5.jpg" alt="Photo5">
  <img src="photo6.jpg" alt="Photo6">
  <img src="photo7.jpg" alt="Photo7">
  <img src="photo8.jpg" alt="Photo8">
</div>

</div>

</body>
</html>
