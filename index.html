<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valentine ❤️</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:50px;
}
h1{
  color:pink;
  font-size:24px;
}
button{
  padding:12px 28px;
  font-size:16px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:15px;
}
#yes{
  background:#ff4b7d;
  color:white;
  box-shadow:0 0 12px pink;
}
#no{
  background:#555;
  color:white;
}
</style>
</head>

<body>

<h1>Will you be my Valentine? 💖</h1>

<button id="yes" onclick="yesClick()">YES ❤️</button>
<button id="no" onclick="noClick()">NO 😜</button>

<script>
function yesClick(){
  window.location.href="message.html";
}
function noClick(){
  window.location.href="no.html";
}
</script>

</body>
</html>
