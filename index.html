<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Valentine ❤️</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
    }

    h1 {
      color: pink;
    }

    .choice {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }

    .choice div {
      text-align: center;
    }

    .choice img {
      width: 90px;
      border-radius: 15px;
    }

    #yes {
      background: linear-gradient(45deg, #ff4b7d, #ff1744);
      color: white;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      box-shadow: 0 0 15px pink;
    }

    #no {
      background: #444;
      color: white;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      position: relative;
    }
  </style>
</head>

<body>

  <h1>Will you be my Valentine? 💖</h1>

  <div class="choice">

    <div>
      <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
      <br><br>
      <button id="yes" onclick="yesClick()">YES ❤️</button>
    </div>

    <div>
      <img src="https://media.giphy.com/media/l2QDM9Jnim1YVILXa/giphy.gif">
      <br><br>
      <button id="no" onmouseover="moveNo()">NO 😜</button>
    </div>

  </div>

  <script>
    function yesClick() {
      window.location.href = "message.html";
    }

    function moveNo() {
      const btn = document.getElementById("no");
      btn.style.left = Math.random() * 200 - 100 + "px";
      btn.style.top = Math.random() * 200 - 100 + "px";
    }
  </script>

</body>
</html>
