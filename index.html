<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine ❤️</title>
<style>
body{
  margin:0;
  padding:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#ffc0cb;
  font-family:Arial;
}
.card{
  background-color:#ffe4e1;
  width:350px;
  max-width:90%;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px #ff69b4;
  text-align:center;
}
h1{
  font-size:22px;
  color:#ff1493;
  margin-bottom:15px;
}
img{
  width:280px;
  border-radius:15px;
  margin-bottom:15px;
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:25px;
  margin:10px;
  cursor:pointer;
}
#yes{background:#ff69b4;color:white;}
#no{background:#ff1493;color:white;position:relative;}
</style>
</head>
<body>

<div class="card">
<h1>Will you be my Valentine? 💖</h1>
<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="Valentine Gif">
<div>
<button id="yes" onclick="yesClick()">YES ❤️</button>
<button id="no" onclick="noClick()">NO 😜</button>
</div>
</div>

<script>
function yesClick(){
  window.location.href="message.html"; // YES → message page
}
function noClick(){
  window.location.href="no1.html"; // NO → first drama page
}
</script>

</body>
</html>
